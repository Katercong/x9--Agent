# X9 系统统一 PostgreSQL 容器
#
# 这个 compose 文件接管了原本通过 `docker run` 手起的 x9-postgres 容器。
# 卷名 x9_pgdata 与原容器一致 —— 切换到 compose 不会丢数据。
#
# 启动:   .\infra\scripts\db_init.ps1
# 备份:   .\infra\scripts\db_backup.ps1
# 还原:   .\infra\scripts\db_restore.ps1 <backup.sql>
#
# 容器名固定为 x9-postgres,代码里硬编码引用了这个名字(scripts/check_postgres_database.py 等)。

services:
  postgres:
    image: postgres:16
    container_name: x9-postgres
    environment:
      POSTGRES_USER: x9
      POSTGRES_PASSWORD: x9_local_dev_2026
      POSTGRES_DB: x9db
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - x9_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x9 -d x9db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  x9_pgdata:
    external: true
    name: x9_pgdata
