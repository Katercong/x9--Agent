<!doctype html>
<html lang="zh-CN" class="sidepanel">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok 全自动采集</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">

      <div class="top-bar">
        <button id="langToggle" class="lang-toggle" type="button" title="Switch language">EN</button>
      </div>

      <section class="auto-card tt">
        <div class="card-head">
          <h2><span data-zh="🎯 TikTok 全自动" data-en="🎯 TikTok Auto">🎯 TikTok 全自动</span></h2>
          <span class="pill" id="ttStatusPill" data-state="idle" data-zh="闲置" data-en="Idle">闲置</span>
        </div>
        <div class="task-row">
          <label for="autoProfilesInput" data-zh="任务数" data-en="Task count">任务数</label>
          <input id="autoProfilesInput" type="number" min="1" max="5000" step="1" value="20">
        </div>
        <div class="btn-row">
          <button id="startAutoBtn" class="btn-start" type="button" data-zh="▶ 开始" data-en="▶ Start">▶ 开始</button>
          <button id="stopAutoBtn"  class="btn-stop"  type="button" data-zh="⏸ 停止" data-en="⏸ Stop">⏸ 停止</button>
          <button id="clearBtn"     class="btn-reset" type="button" data-zh="重置" data-en="Reset">重置</button>
        </div>
        <div class="counts">
          <div><strong id="leadCount">0</strong><span data-zh="线索" data-en="Leads">线索</span></div>
          <div><strong id="pendingCount">0</strong><span data-zh="队列" data-en="Queue">队列</span></div>
          <div><strong id="skippedCount">0</strong><span data-zh="跳过" data-en="Skipped">跳过</span></div>
          <div><strong id="ttErrorCount">0</strong><span data-zh="错误" data-en="Errors">错误</span></div>
        </div>
        <p class="footnote" id="ttFootnote"></p>
      </section>

      <section class="auto-card shop" id="shopPanel">
        <div class="card-head">
          <h2><span data-zh="🛒 TikTok Shop 全自动" data-en="🛒 TikTok Shop Auto">🛒 TikTok Shop 全自动</span></h2>
          <span class="pill" id="shopStatusPill" data-state="idle" data-zh="闲置" data-en="Idle">闲置</span>
        </div>
        <div class="task-row">
          <label for="shopTaskCount" data-zh="任务数" data-en="Task count">任务数</label>
          <input id="shopTaskCount" type="number" min="1" max="5000" step="1" value="20">
        </div>
        <div class="btn-row">
          <button id="shopStartBtn" class="btn-start" type="button" data-zh="▶ 开始" data-en="▶ Start">▶ 开始</button>
          <button id="shopStopBtn"  class="btn-stop"  type="button" data-zh="⏸ 停止" data-en="⏸ Stop">⏸ 停止</button>
          <button id="shopResetBtn" class="btn-reset" type="button" data-zh="重置" data-en="Reset">重置</button>
        </div>
        <div class="counts">
          <div><strong id="shopCountList">0</strong><span data-zh="队列" data-en="Queue">队列</span></div>
          <div><strong id="shopCountDetailOk">0</strong><span data-zh="已提取" data-en="Extracted">已提取</span></div>
          <div><strong id="shopCountDetailFail">0</strong><span data-zh="详情失败" data-en="Detail Fail">详情失败</span></div>
          <div><strong id="shopCountErrors">0</strong><span data-zh="错误" data-en="Errors">错误</span></div>
        </div>
        <p class="footnote" id="shopError"></p>
        <p class="footnote" id="shopPhase"></p>
        <p class="footnote" id="shopCurrent"></p>
      </section>

    </main>

    <div class="legacy-shim" aria-hidden="true">
      <select id="languageSelect"><option value="zh" selected>中文</option><option value="en">English</option></select>
      <input id="keywordInput" type="text" value="">
      <input id="requireEmailInput" type="checkbox" checked>
      <input id="minFollowersInput" type="number" value="1000">
      <span id="runTimer">00:00:00</span>
      <span id="runTimerMeta">未开始</span>
      <button id="openPanelBtn" type="button"></button>
      <button id="openSearchBtn" type="button"></button>
      <button id="scanPageBtn" type="button"></button>
      <button id="openNextBtn" type="button"></button>
      <button id="exportCsvBtn" type="button"></button>
      <button id="exportExcelBtn" type="button"></button>
      <button id="exportJsonBtn" type="button"></button>
      <button id="exportBackupBtn" type="button"></button>
      <button id="copyNextBtn" type="button"></button>
      <ul id="queueList"><li class="empty"></li></ul>
      <ul id="leadList"><li class="empty"></li></ul>
      <p id="status"></p>
      <input id="shopEndpointInput" type="url" value="https://usx9.us/api/local/collector/observations">
      <input id="x9BackendInput" type="url">
      <span id="x9BackendStatus"></span>
      <button id="x9BackendSave" type="button"></button>
      <button id="x9BackendDetect" type="button"></button>
    </div>

    <script src="popup.js"></script>
    <script src="shop_panel.js"></script>
    <script src="i18n_toggle.js"></script>
  </body>
</html>
